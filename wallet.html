<!DOCTYPE html>
<html>
<head>
  <title>Wallet</title>
  <link rel="stylesheet" href="wallet.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<h1 class="title">💼 My Wallet</h1>

<!-- TOP CARD (HOME STYLE) -->
<div class="card">
  <h2>👋 Welcome Player</h2>

  <div class="coins-row">
    <div class="coin-box">
      <p>💰 Cash Coins</p>
      <h3 id="coins">0</h3>
    </div>

    <div class="coin-box">
      <p>🎁 Bonus Coins</p>
      <h3 id="bonus">0</h3>
    </div>
  </div>
</div>

<!-- ACTION BUTTONS (HOME GRID STYLE) -->
<div class="grid">

  <div class="game-box deposit" onclick="goDeposit()">
    <h3>💰</h3>
    <p>Deposit</p>
  </div>

  <div class="game-box withdraw" onclick="withdraw()">
    <h3>💸</h3>
    <p>Withdraw</p>
  </div>

  <div class="game-box reward" onclick="reward()">
    <h3>🎁</h3>
    <p>Rewards</p>
  </div>

  <div class="game-box stats">
    <h3>📊</h3>
    <p>Stats</p>
  </div>

</div>

<!-- LEVEL BAR -->
<div class="card">
  <p>Level Progress</p>
  <div class="bar">
    <div class="fill" id="levelBar"></div>
  </div>
</div>

<!-- TRANSACTIONS -->
<div class="card">
  <h3>📜 Transactions</h3>
  <div id="transactions"></div>
</div>

function goDeposit(){
window.location.href = "deposit.html";

  alert("Withdraw page coming");

  alert("Rewards coming");

async function loadWallet(){

  const { data: { user } } = await supabaseClient.auth.getUser();

  if(!user){
    window.location.href = "login.html";
    return;
  }

  let { data } = await supabaseClient
    .from("users")
    .select("coins, bonus")
    .eq("id", user.id)
    .single();

  let coins = data?.coins ` 0;
  let bonus = data?.bonus 
 `0;

  document.getElementById("coins").innerText = coins;
  document.getElementById("bonus").innerText = bonus;

  let percent = Math.min(coins / 1000 * 100, 100);
  document.getElementById("levelBar").style.width = percent + "%";
}

loadWallet();
</script>
