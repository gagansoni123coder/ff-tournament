<!DOCTYPE html>
<html>
<head>
  <title>Wallet</title>
  <link rel="stylesheet" href="wallet.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<!-- TOP CARD -->
<div class="top-card">
  <h1>💼 My Wallet</h1>
  <p>Total Coins</p>
  <h2 id="coins">0</h2>
</div>

<!-- BUTTON GRID -->
<div class="grid">

  <button class="card-btn deposit" onclick="goDeposit()">
    <span class="icon">💰</span>
    <span>Deposit</span>
  </button>

  <button class="card-btn withdraw" onclick="withdraw()">
    <span class="icon">💸</span>
    <span>Withdraw</span>
  </button>

  <button class="card-btn reward">
    <span class="icon">🎁</span>
    <span>Rewards</span>
  </button>

  <button class="card-btn stats">
    <span class="icon">📊</span>
    <span>Stats</span>
  </button>

</div>

<!-- SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
const supabaseClient = supabase.createClient(
  "https://ggkqsfkxmmusrmczoyuk.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdna3FzZmt4bW11c3JtY3pveXVrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyNjg2NDIsImV4cCI6MjA5MDg0NDY0Mn0.p5Y2FFlNsFweZ2yc290eRs92mVKJTLnEU2C2y-qZZBI"
);

// redirect
function goDeposit(){
  window.location.href = "deposit.html";
}

function withdraw(){
  window.location.href = "withdraw.html";
}

function reward(){
  alert("Rewards coming soon");
}

// load coins
async function loadWallet(){

  const { data: { user } } = await supabaseClient.auth.getUser();

  if(!user){
    window.location.href = "login.html";
    return;
  }

  let { data } = await supabaseClient
    .from("users")
    .select("coins")
    .eq("id", user.id)
    .single();

  document.getElementById("coins").innerText = data?.coins || 0;
}

loadWallet();
</script>

</body>
</html>
