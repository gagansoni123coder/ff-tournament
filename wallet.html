<!DOCTYPE html>
<html>
<head>
  <title>Wallet</title>
  <link rel="stylesheet" href="wallet.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<h1 class="title">💼 My Wallet</h1>

<!-- TOP BALANCE -->
<div class="balance-box">
  <h2 id="coins">0</h2>
  <p>Total Coins</p>
</div>

<!-- ACTION BOXES -->
<div class="grid">

  <div class="box" onclick="goDeposit()">
    <h3>💰</h3>
    <p>Deposit</p>
  </div>

  <div class="box" onclick="withdraw()">
    <h3>💸</h3>
    <p>Withdraw</p>
  </div>

  <div class="box" onclick="claimReward()">
    <h3>🎁</h3>
    <p>Reward</p>
  </div>

  <div class="box">
    <h3>📊</h3>
    <p>Stats</p>
  </div>

</div>

<!-- LEVEL -->
<div class="level-box">
  <p>Level Progress</p>
  <div class="bar">
    <div class="fill" id="levelBar"></div>
  </div>
</div>

<!-- TRANSACTIONS -->
<div class="history">
  <h3>📜 Transactions</h3>
  <div id="transactions"></div>
</div>

<!-- SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
const supabaseClient = supabase.createClient(
  "https://ggkqsfkxmmusrmczoyuk.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdna3FzZmt4bW11c3JtY3pveXVrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyNjg2NDIsImV4cCI6MjA5MDg0NDY0Mn0.p5Y2FFlNsFweZ2yc290eRs92mVKJTLnEU2C2y-qZZBI"
);

// redirect
function goDeposit(){
  window.location.href = "deposit.html";
}

// withdraw
function withdraw(){
  alert("Withdraw page coming");
}

// reward demo
function claimReward(){
  alert("Reward system next step 🔥");
}

// load wallet
async function loadWallet(){

  const { data: { user } } = await supabaseClient.auth.getUser();

  if(!user){
    window.location.href = "login.html";
    return;
  }

  let { data } = await supabaseClient
    .from("users")
    .select("coins")
    .eq("id", user.id)
    .single();

  let coins = data?.coins || 0;

  document.getElementById("coins").innerText = coins;

  let percent = Math.min(coins / 1000 * 100, 100);
  document.getElementById("levelBar").style.width = percent + "%";
}

loadWallet();
</script>

</body>
</html>
