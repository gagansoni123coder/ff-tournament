   <p> pay on this upi:</p>

<!-- SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
const supabaseClient = supabase.createClient(
  "https://ggkqsfkxmmusrmczoyuk.supabase.co/",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdna3FzZmt4bW11c3JtY3pveXVrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyNjg2NDIsImV4cCI6MjA5MDg0NDY0Mn0.p5Y2FFlNsFweZ2yc290eRs92mVKJTLnEU2C2y-qZZBI"
);

// load coins
async function loadCoins() {
  const { data: { user } } = await supabaseClient.auth.getUser();

  if (!user) {
    alert("Login first!");
    window.location.href = "login.html";
    return;
  }

  let { data, error } = await supabaseClient
    .from("users")
    .select("coins")
    .eq("id", user.id)
    .single();

  if (error) {
    console.log(error);
  }

  document.getElementById("coins").innerText = data?.coins || 0;
}

loadCoins();


// deposit
async function deposit() {

  let amount = prompt("Enter amount:");
  if (!amount) return;

  let utr = prompt("Enter UTR / Transaction ID:");
  if (!utr) return;

  const { data: { user } } = await supabaseClient.auth.getUser();

  await supabaseClient.from("deposits").insert([
    {
      user_id: user.id,
      amount: amount,
      utr: utr,
      status: "pending"
    }
  ]);

  alert("Deposit request sent ✅ Wait for admin approval");
}
// withdraw
function withdraw() {
  let amount =
prompt("Enter withdraw amount:");
  if (!amount) return alert("Enter amount!");

  alert("Withdraw request sent (admin approval pending) ✅");
}
</script>
