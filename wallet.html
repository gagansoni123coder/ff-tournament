<!DOCTYPE html>
<html>
<head>
  <title>Wallet</title>
  <link rel="stylesheet" href="wallet.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<div class="wallet">

  <!-- TOP -->
  <div class="header">
    <h2>💼 My Wallet</h2>
  </div>

  <!-- COINS -->
  <div class="coins-box">
    <p>Total Coins</p>
    <h1 id="coins">0</h1>
  </div>

  <!-- ACTIONS -->
  <div class="actions">
    <button onclick="goDeposit()">💰 Deposit</button>
    <button onclick="withdraw()">💸 Withdraw</button>
  </div>

  <!-- HISTORY -->
  <div class="history">
    <h3>📜 Transactions</h3>
    <div id="historyList">No data</div>
  </div>

</div>

<script>

// redirect to payment page
function goDeposit(){
  window.location.href = "payment.html";
}

// withdraw (same logic use kar sakta hai)
function withdraw(){
  alert("Withdraw system connected hai admin se");
}
  function animateCoins(finalCoins) {
  let current = 0;
  let step = Math.ceil(finalCoins / 50);

  let interval = setInterval(() => {
    current += step;
    if (current >= finalCoins) {
      current = finalCoins;
      clearInterval(interval);
    }
    document.getElementById("coins").innerText = current;
  }, 20);
}


</script>

</body>
</html>
