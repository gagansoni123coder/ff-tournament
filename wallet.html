<!DOCTYPE html>
<html>
<head>
  <title>Wallet</title>
  <link rel="stylesheet" href="wallet.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<div class="wallet">

  <!-- COINS -->
  <div class="coins-section">
    <div class="card">
      <p>Main Coins</p>
      <h1 id="coins">0</h1>
    </div>

    <div class="card bonus">
      <p>Bonus Coins</p>
      <h1 id="bonus">0</h1>
    </div>
  </div>

  <!-- ACTION GRID -->
  <div class="grid">
    <button onclick="goDeposit()">💰 Deposit</button>
    <button onclick="withdraw()">💸 Withdraw</button>
    <button onclick="claimReward()">🎁 Reward</button>
    <button onclick="alert('Stats coming')">📊 Stats</button>
  </div>

  <!-- DAILY REWARD -->
  <div class="reward-box">
    <button onclick="claimReward()">🎁 Claim Daily Reward</button>
  </div>

  <!-- LEVEL -->
  <div class="level">
    <p>Level 1</p>
    <div class="bar">
      <div class="fill" id="levelBar"></div>
    </div>
  </div>

  <!-- HISTORY -->
  <div class="history">
    <h3>📜 Transactions</h3>
    <div id="historyList"></div>
  </div>

</div>

<script>

// navigation
function goDeposit(){
  window.location.href = "deposit.html";
}

// withdraw
function withdraw(){
  alert("Withdraw system connected");
}

// 🎁 DAILY REWARD
function claimReward(){
  let last = localStorage.getItem("rewardTime");
  let now = Date.now();

  if(last && now - last < 86400000){
    alert("Already claimed today ❌");
    return;
  }

  let reward = 50;

  let coins = Number(localStorage.getItem("coins")  `0);
  coins += reward;

  localStorage.setItem("coins", coins);
  localStorage.setItem("rewardTime", now);

  loadWallet();
  alert("🎉 +50 Coins Added!");
`}

// LOAD DATA
function loadWallet(){

  let coins = Number(localStorage.getItem("coins")  0);
let bonus = Number(localStorage.getItem("bonus") || 0);

  document.getElementById("coins").innerText = coins;
  document.getElementById("bonus").innerText = bonus;

  // level bar
  let percent = Math.min(coins / 1000 * 100, 100);
  document.getElementById("levelBar").style.width = percent + "%";

  // history demo
  let html =` 
    <div class="item green">+100 Deposit</div>
    <div class="item red">-50 Withdraw</div>
    <div class="item yellow">Pending</div>
  `;

  document.getElementById("historyList").innerHTML = html;
}

loadWallet();

</script>
