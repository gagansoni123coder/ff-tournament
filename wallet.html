<!DOCTYPE html>
<html>
<head>
  <title>Wallet</title>
  <link rel="stylesheet" href="wallet.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<div class="wallet">

  <!-- TOP -->
  <div class="wallet">

  <!-- HEADER -->
  <h2 class="title">💼 My Wallet</h2>

  <!-- COINS CARD -->
  <div class="coins-box">
    <p>Total Coins</p>
    <h1 id="coins">0</h1>
  </div>

  <!-- ACTION BUTTONS -->
  <div class="actions">
    <button class="deposit-btn" onclick="goDeposit()">💰 Deposit</button>
    <button class="withdraw-btn" onclick="withdraw()">💸 Withdraw</button>
  </div>

  <!-- EXTRA FEATURES -->
  <div class="extras">
    <div class="extra-card">🎁 Bonus</div>
    <div class="extra-card">🏆 Rewards</div>
    <div class="extra-card">📊 Stats</div>
  </div>

  <!-- HISTORY -->
  <div class="history">
    <h3>📜 Transactions</h3>
    <div id="historyList"></div>
  </div>

</div>

<script>

// redirect to payment page
function goDeposit(){
  window.location.href = "payment.html";
}

// withdraw (same logic use kar sakta hai)
function withdraw(){
  alert("Withdraw system connected hai admin se");
}
  function animateCoins(finalCoins) {
  let current = 0;
  let step = Math.ceil(finalCoins / 50);

  let interval = setInterval(() => {
    current += step;
    if (current >= finalCoins) {
      current = finalCoins;
      clearInterval(interval);
    }
    document.getElementById("coins").innerText = current;
  }, 20);
}


</script>

</body>
</html>
