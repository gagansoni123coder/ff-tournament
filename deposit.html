<!DOCTYPE html>
<html>
<head>
  <title>Deposit</title>
  <link rel="stylesheet" href="deposit.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<h2>💰 Scan & Pay</h2>

<div class="box">

  <!-- QR IMAGE -->
  <img src="qr.png" style="width:290px; height:300px; display:block; margin:auto;">

  <!-- TIMER -->
  <h3 id="timer">02:00</h3>

  <!-- PAID BUTTON -->
  <button id="paidBtn" onclick="paid()">I HAVE PAID</button>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
const supabaseClient = supabase.createClient(
  "https://ggkqsfkxmmusrmczoyuk.supabase.co/",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdna3FzZmt4bW11c3JtY3pveXVrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyNjg2NDIsImV4cCI6MjA5MDg0NDY0Mn0.p5Y2FFlNsFweZ2yc290eRs92mVKJTLnEU2C2y-qZZBI"
);

// ⏳ TIMER
let time = 120; // 2 min

let x = setInterval(() => {

  let min = Math.floor(time / 60);
  let sec = time % 60;

  document.getElementById("timer").innerText =
    ${min}:${sec < 10 ? "0"+sec : sec};

  time--;

  if(time < 0){
    clearInterval(x);
    alert("Time expired ⏳");
    `window.location.href = "wallet.html"`;
  }

}, 1000);


// 💰 PAID BUTTON
async function paid(){

  let amount = prompt("Enter Amount:");

  if(!amount || isNaN(amount)){
    alert("❌ Valid amount required!");
    return;
  }

  let utr = prompt("Enter UTR / Transaction ID:");

  if(!utr){
    alert("❌ UTR required!");
    return;
  }

  let btn = document.getElementById("paidBtn");
  btn.innerText = "Processing...";
  btn.disabled = true;

  let user = { id: "test_user" };

  const { data, error } = await supabaseClient
    .from("deposits")
    .insert([
      {
        user_id: user.id,
        amount: Number(amount),
        utr: utr,
        status: "pending"
      }
    ]);

  console.log("RESULT:", data, error);

  if(error){
    alert("❌ Error: " + error.message);
    btn.innerText = "I HAVE PAID";
    btn.disabled = false;
    return;
  }

  alert("✅ Payment Submitted!\nWait for admin approval.\nCoins will be added soon 💰");

  window.location.href = "wallet.html";
}
</script>

</body>
</html>
