<!DOCTYPE html>
<html>
<head>
  <title>Deposit</title>
  <link rel="stylesheet" href="deposit.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<h2>💰 Scan & Pay</h2>

<div class="box">

  <!-- QR IMAGE -->
  <img src="qr.png" style="width:290px; height:300px; display:block; margin:auto;">

  <!-- TIMER -->
  <h3 id="timer">02:00</h3>

  <!-- PAID BUTTON -->
  <button id="paidBtn">I HAVE PAID</button>

<script>
document.getElementById("paidBtn").addEventListener("click", async function(){

  alert("ENTER PAYMENT DETAILS");

  let amount = prompt("Enter Amount:");
  if(!amount) return;

  let utr = prompt("Enter UTR:");
  if(!utr) return;

  alert("✅ Payment Submitted!\nWait for admin approval.\nCoins will be added soon 💰");

    alert(" redirecting to wallet....");
          
  window.location.href = "wallet.html";
}
});
</script>


</html>

</body>
</html>
