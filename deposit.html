<!DOCTYPE html>
<html>
<head>
  <title>Deposit</title>
  <link rel="stylesheet" href="deposit.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<h2>💰 Scan & Pay</h2>

<div class="box">

  <!-- QR IMAGE -->
  <img src="qr.png" style="width:180px; height:180px; display:block; margin:auto;">

  <!-- TIMER -->
  <h3 id="timer">02:00</h3>

  <!-- PAID BUTTON -->
  <button onclick="paid()">I HAVE PAID</button>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
const supabaseClient = supabase.createClient(
  "https://ggkqsfkxmmusrmczoyuk.supabase.co/",
  "YOUR_ANON_KEY"
);

// ⏳ TIMER
let time = 120; // 2 min

let x = setInterval(() => {

  let min = Math.floor(time / 60);
  let sec = time % 60;

  document.getElementById("timer").innerText =
    ${min}:${sec < 10 ? "0"+sec : sec};

  time--;

  if(time < 0){
    clearInterval(x);
    alert("Time expired ⏳");
    `window.location.href = "wallet.html"`;
  }

}, 1000);


// 💰 PAID BUTTON
async function paid(){

  let utr = prompt("Enter UTR / Transaction ID:");

  if(!utr){
    alert("UTR required!");
    return;
  }

  // TEMP USER (baad me real user laga denge)
  let user = { id: "test_user" };

  const { error } = await supabaseClient
    .from("deposits")
    .insert([
      {
        user_id: user.id,
        amount: 100, // fix ya baad me dynamic
        utr: utr,
        status: "pending"
      }
    ]);

  if(error){
    alert("Error: " + error.message);
    return;
  }

  alert("✅ Wait for admin approval\nCoins will be added soon");

  window.location.href = "wallet.html";
}
</script>

</body>
</html>
