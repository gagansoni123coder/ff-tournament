<!DOCTYPE html>
<html>
<head>
  <title>Deposit</title>
  <link rel="stylesheet" href="deposit.css">
</head>

<body>

<h1>💰 Deposit</h1>

<div class="box">
  <img src="qr.png" style="width:290px; height:300px; display:block; margin:auto;">

  <p>Scan & Pay</p>

  <p id="timer">05:00</p>

  <button onclick="paid()">✅ I HAVE PAID</button>
</div>


<!-- ✅ Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
const supabaseClient = supabase.createClient(
  "https://ggkqsfkxmmusrmczoyuk.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdna3FzZmt4bW11c3JtY3pveXVrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyNjg2NDIsImV4cCI6MjA5MDg0NDY0Mn0.p5Y2FFlNsFweZ2yc290eRs92mVKJTLnEU2C2y-qZZBI"
);


// ⏳ TIMER
let time = 300;

setInterval(()=>{
  time--;

  let min = Math.floor(time / 60);
  let sec = time % 60;

  document.getElementById("timer").innerText =`
    ${min}:${sec < 10 ? "0"+sec : sec}`;

  if(time <= 0){
    alert("Time expired ⏳");
    window.location.href = "wallet.html";
  }

},1000);


// 💰 PAID BUTTON
async function paid(){

  let amount = prompt("Enter Amount:");
  let utr = prompt("Enter UTR:");

  if(!amount || !utr){
    alert("Fill all details");
    return;
  }

  // 👤 get user
  const { data: { user } } = await supabaseClient.auth.getUser();

  if(!user){
    alert("Login first");
    window.location.href = "login.html";
    return;
  }

  // 📥 INSERT
  const { error } = await supabaseClient
    .from("deposits")
    .insert([
      {
        uid: user.id,
        amount: Number(amount),
        utr: utr,
        status: "pending"
      }
    ]);

  if(error){
    alert("Error ❌");
    console.log(error);
    return;
  }

  alert("✅ Request sent! Wait for admin approval");

  window.location.href = "wallet.html";
}
</script>

</body>
</html>
