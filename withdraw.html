<body>

<div class="container">

  <h1>💸 Withdraw Coins</h1>

  <div class="card">
    <input type="number" id="amount" placeholder="Enter Amount" />
    <input type="text" id="upi" placeholder="Enter UPI ID" />

    <button class="btn" onclick="sendWithdraw()">Submit Request</button>
  </div>

</div>

<!-- ✅ SUPABASE SCRIPT -->

<script>
const supabaseClient = supabase.createClient(
  "https://gkgqsfkxmmusrmczoyuk.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdna3FzZmt4bW11c3JtY3pveXVrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyNjg2NDIsImV4cCI6MjA5MDg0NDY0Mn0.p5Y2FFlNsFweZ2yc290eRs92mVKJTLnEU2C2y-qZZBI"
);

async function sendWithdraw() {
  alert("function working");
}

  let amount = document.getElementById("amount").value;
  let upi = document.getElementById("upi").value;

  if (!amount || !upi) {
    alert("Fill all details");
    return;
  }

  const { error } = await supabaseClient
    .from("withdraws")
    .insert([
      {
        uid: "test_user",
        amount: Number(amount),
        upi: upi,
        status: "pending"
      }
    ]);

  if (error) {
    console.log(error);
    alert("Error: " + error.message);
    return;
  }

  alert("Withdraw request sent ✅");
}
    document.getElementById("amount").value = "";
    document.getElementById("upi").value = "";

  } catch (err) {
    console.log(err);
    alert("Something went wrong");
  }

}
