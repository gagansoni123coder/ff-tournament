<!DOCTYPE html>
<html>
<head>
  <title>Withdraw</title>
  <link rel="stylesheet" href="withdraw.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<h1>💸 Withdraw</h1>

<div class="box">
  <input type="number" id="amount" placeholder="Enter Amount">
  <input type="text" id="upi" placeholder="Enter UPI ID">

  <button onclick="sendWithdraw()">Submit</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
const supabaseClient = supabase.createClient(
  "https://ggkqsfkxmmusrmczoyuk.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdna3FzZmt4bW11c3JtY3pveXVrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyNjg2NDIsImV4cCI6MjA5MDg0NDY0Mn0.p5Y2FFlNsFweZ2yc290eRs92mVKJTLnEU2C2y-qZZBI");

async function sendWithdraw(){
console.log("button clicked");
  
  let amount = document.getElementById("amount").value;
  let upi = document.getElementById("upi").value;

  if(!amount || !upi){
    alert("Fill all details");
    return;
  }

  const { data: { user } } = await supabaseClient.auth.getUser();

  if(!user){
    alert("Login first");
    return;
  }

  // check coins
  let { data } = await supabaseClient
    .from("users")
    .select("coins")
    .eq("uid", user.id)
    .single();

  if(data.coins < amount){
    alert("Not enough balance ❌");
    return;
  }

  // insert request
  await supabaseClient
    .from("withdraws")
    .insert([
      {
        uid: user.id,
        amount: Number(amount),
        upi: upi,
        status: "pending"
      }
    ]);

  alert("✅ Request Sent");

  window.location.href = "wallet.html";
}
</script>

</body>
</html>
