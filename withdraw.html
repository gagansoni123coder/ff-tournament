<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Withdraw | SoniX Esports</title>
  <link rel="stylesheet" href="withdraw.css"/>
</head>
<body>

  <div class="container">
    <div class="logo">SoniX <span>Esports</span></div>
    <h2>Withdraw Request 💰</h2>

    <form id="withdrawForm">

      <div class="input-group">
        <label>User ID</label>
        <input type="text" id="user_id" placeholder="Enter your user ID" required>
      </div>

      <div class="input-group">
        <label>Amount</label>
        <input type="number" id="amount" placeholder="Enter amount" required>
      </div>

      <div class="input-group">
        <label>Payment Method</label>
        <select id="method" required>
          <option value="">Select</option>
          <option value="upi">UPI</option>
          <option value="paytm">Paytm</option>
          <option value="bank">Bank</option>
        </select>
      </div>

      <div class="input-group">
        <label>UPI / Account Details</label>
        <input type="text" id="details" placeholder="Enter UPI or Account no." required>
      </div>

      <button type="submit">Request Withdraw 🚀</button>

    </form>

    <p class="note">Withdraw request will be processed in 24-48 hours ⏳</p>
  </div>

  <!-- Supabase -->
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

 <script>
const supabaseUrl = "https://ggkqsfkxmmusrmczoyuk.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdna3FzZmt4bW11c3JtY3pveXVrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyNjg2NDIsImV4cCI6MjA5MDg0NDY0Mn0.p5Y2FFlNsFweZ2yc290eRs92mVKJTLnEU2C2y-qZZBI";

const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

const form = document.getElementById("withdrawForm");

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  const user_id = document.getElementById("user_id").value.trim();
  const amount = document.getElementById("amount").value.trim();
  const method = document.getElementById("method").value;
  const details = document.getElementById("details").value.trim();

  // 🔥 BASIC VALIDATION
  if (!user_id  ||!amount  ||!method || !details) {
    alert("Please fill all fields");
    return;
  }

  // 🔥 CHECK USER EXISTS (optional safe check)
  const { data: user, error: checkError } = await supabase
    .from("users")
    .select("id")
    .eq("id", user_id)
    .maybeSingle();

  if (checkError) {
    alert("Error: " + checkError.message);
    return;
  }

  if (!user) {
    alert("User not found 😢");
    return;
  }

  // 🔥 INSERT WITHDRAW REQUEST
  const { data, error } = await supabase
    .from("withdrawals")
    .insert([
      {
        user_id,
        amount: Number(amount),
        method,
        details,
        status: "pending"
      }
    ]);

  if (error) {
    console.log(error);
    alert("Error: " + error.message);
    return;
  }

  alert("Withdraw request submitted successfully 🔥");
  form.reset();
});
</script>
</body>
</html>
