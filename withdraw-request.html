<!DOCTYPE html>
<html>
<head>
  <title>Withdraw Requests</title>
  <link rel="stylesheet" href="withdraw-request.css">
</head>

<body>

<h1>💸 Withdraw Requests</h1>

<div id="data"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
const supabaseClient = supabase.createClient(
  "https://ggkqsfkxmmusrmczoyuk.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdna3FzZmt4bW11c3JtY3pveXVrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyNjg2NDIsImV4cCI6MjA5MDg0NDY0Mn0.p5Y2FFlNsFweZ2yc290eRs92mVKJTLnEU2C2y-qZZBI"
);

async function loadData(){

  const { data } = await supabaseClient
    .from("withdraws")
    .select("*")
    .order("created_at", { ascending: false });

  let div = document.getElementById("data");
  div.innerHTML = "";

  data.forEach(d => {

    div.innerHTML +=` 
      <div class="card">
        <p>UID: ${d.uid}</p>
        <p>Amount: ₹${d.amount}</p>
        <p>UPI: ${d.upi}</p>
        <p>Status: ${d.status}</p>

        ${
          d.status === "pending"
          ?`
          <button onclick="approve('${d.id}', '${d.uid}', ${d.amount})">Approve</button>
          <button onclick="reject('${d.id}')">Reject</button>
          `
          : ""
        }
      </div>
    `;
  });
}

loadData();


// ✅ APPROVE
async function approve(id, uid, amount){

  // update status
  await supabaseClient
    .from("withdraws")
    .update({ status: "approved" })
    .eq("id", id);

  // get coins
  let { data } = await supabaseClient
    .from("users")
    .select("coins")
    .eq("uid", uid)
    .single();

  let coins = data.coins || 0;

  // deduct coins
  await supabaseClient
    .from("users")
    .update({ coins: coins - amount })
    .eq("uid", uid);

  alert("✅ Approved");

  loadData();
}


// ❌ REJECT
async function reject(id){

  await supabaseClient
    .from("withdraws")
    .update({ status: "rejected" })
    .eq("id", id);

  alert("❌ Rejected");

  loadData();
}
</script>

</body>
</html>
