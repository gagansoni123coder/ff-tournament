<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<h1 class="title">🎮 Admin Dashboard</h1>

<!-- STATS -->
<div class="stats">

  <div class="card">
    <h2 id="totalUsers">0</h2>
    <p>Total Users</p>
  </div>

  <div class="card">
    <h2 id="totalDeposits">₹0</h2>
    <p>Total Deposits</p>
  </div>

  <div class="card">
    <h2 id="pending">0</h2>
    <p>Pending Requests</p>
  </div>

  <div class="card">
    <h2 id="withdraw">₹0</h2>
    <p>Total Withdraw</p>
  </div>

</div>

<!-- QUICK ACTION -->
<div class="actions">
  <button onclick="go('admin.html')">💰 Manage Deposits</button>
  <button onclick="go('withdraw.html')">💸 Withdraw</button>
  <button onclick="go('users.html')">👤 Users</button>
</div>

<!-- RECENT -->
<h2 class="sub">⚡ Recent Activity</h2>
<div id="activity"></div>

<script>

// NAVIGATION
function go(page){
  window.location.href = page;
}

// DEMO DATA (baad me supabase se replace karenge)
let deposits = [
  {user:"User1", amount:100, status:"approved"},
  {user:"User2", amount:200, status:"pending"},
  {user:"User3", amount:300, status:"rejected"}
];

// LOAD STATS
function loadDashboard(){

  document.getElementById("totalUsers").innerText = 10;
  document.getElementById("totalDeposits").innerText = "₹600";
  document.getElementById("pending").innerText = 1;
  document.getElementById("withdraw").innerText = "₹200";

  let html = "";

  deposits.forEach(d => {
    html +=` 
      <div class="activity-card">
        <p>${d.user}</p>
        <p>₹${d.amount}</p>
        <p class="${d.status}">${d.status}</p>
      </div>
    ';
  });

  document.getElementById("activity").innerHTML = html;
}

loadDashboard();

</script>

</body>
</html>
