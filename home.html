<!DOCTYPE html>
<html>
<head>
  <title>Home</title>
  <link rel="stylesheet" href="style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<header>🔥 SONIE ESPORTS DASHBOARD</header>

<div class="user-card">
  <h2>Welcome Player 🎮</h2>
  <p>Coins: <span id="coins">0</span></p>
</div>

<div class="grid">

  <div class="card" onclick="goTo('tournaments.html')">🏆<br>Tournaments</div>
  <div class="card" onclick="goTo('battle.html')">⚔<br>1v1 Battle</div>
  <div class="card" onclick="goTo('rewards.html')">🎁<br>Rewards</div>
  <div class="card" onclick="goTo('wallet.html')">💰<br>Wallet</div>
  <div class="card" onclick="goTo('history.html')">📜<br>History</div>
  <div class="card" onclick="goTo('teams.html')">👥<br>Teams</div>
  <div class="card" onclick="goTo('leaderboard.html')">📊<br>Leaderboard</div>
  <div class="card" onclick="goTo('games.html')">🎮<br>Games</div>
  <div class="card" onclick="goTo('notification.html')">🔔<br>Notifications</div>
  <div class="card" onclick="goTo('profile.html')">👤<br>Profile</div>

</div>

<script>
function goTo(page){
  window.location.href = page;
}
</script>

<!-- ✅ SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
const supabaseClient = supabase.createClient(
  "https://ggkqsfkxmmusrmczoyuk.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdna3FzZmt4bW11c3JtY3pveXVrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyNjg2NDIsImV4cCI6MjA5MDg0NDY0Mn0.p5Y2FFlNsFweZ2yc290eRs92mVKJTLnEU2C2y-qZZBI"
);

// 🚀 INIT
async function init(){

  const { data } = await supabaseClient.auth.getSession();
  const user = data.session?.user;

  if(!user){
    window.location.href = "login.html";
    return;
  }

  loadUser(user.id);
  realtimeCoins(user.id);
}


// 👤 LOAD USER DATA
async function loadUser(uid){
  
  const { data, error } = await supabaseClient
    .from("users")
    .select("name, coins")
    .eq("uid", uid)
    .single();

  if(error){
    console.log(error);
    return;
  }

  document.querySelector(".user-card h2").innerText =
    Welcome ${data.name || "Player"} 🎮;

  document.getElementById("coins").innerText = data.coins || 0;
}


// 🔴 REALTIME COINS UPDATE
function realtimeCoins(uid){

  supabaseClient
    .channel("coins-channel")
    .on(
      "postgres_changes",
      {
        event: "UPDATE",
        schema: "public",
        table: "users"
      },
      payload => {

        if(payload.new.uid === uid){
          document.getElementById("coins").innerText =
            payload.new.coins;
        }

      }
    )
    .subscribe();
}

init();
</script>

</body>
</html>
