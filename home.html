</head>

<body>

<!-- 🔥 HEADER -->
<div class="header">
  <div>
    <p class="welcome">Welcome Back,</p>
    <h2 id="username">Loading...</h2>
  </div>

  <div class="wallet-box">

  </div>
</div>

<!-- 📢 INFO BAR -->
<div class="info">
  📣 Important info — click here
</div>

<!-- 🎮 GAME GRID -->
<div class="grid">

  <div class="game-card" onclick="goTo('fullmap.html')">
    <img src="fullmap.jpg">
  </div>

  <div class="game-card" onclick="goTo('cs1v1.html')">
    <img src="images/cs1v1.png">
  </div>

  <div class="game-card" onclick="goTo('lw1v1.html')">
    <img src="images/lw1v1.png">
  </div>

  <div class="game-card" onclick="goTo('survival.html')">

  </div>

  <div class="game-card" onclick="goTo('cs2v2.html')">

    <img src="images/free.png">

</div>
<!-- 🎁 REFER -->
<div class="refer">
  <img src="images/refer.png">
</div>

<!-- 🔻 BOTTOM NAV -->
<div class="bottom-nav">
  <div onclick="goTo('earn.html')">💰<br>Earn</div>
  <div onclick="goTo('games.html')">🎮<br>Play</div>
  <div onclick="goTo('profile.html')">👤<br>Account</div>
</div>


<!-- ✅ SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
const supabaseClient = supabase.createClient(
  "https://ggkqsfkxmmusrmczoyuk.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdna3FzZmt4bW11c3JtY3pveXVrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyNjg2NDIsImV4cCI6MjA5MDg0NDY0Mn0.p5Y2FFlNsFweZ2yc290eRs92mVKJTLnEU2C2y-qZZBI"
);

// 🚀 INIT
async function init(){

  const { data } = await supabaseClient.auth.getSession();
  const user = data.session?.user;

  if(!user){
    window.location.href = "login.html";
    return;
  }

  loadUser(user.id);
  realtimeCoins(user.id);
}


// 👤 LOAD USER
async function loadUser(uid){

  const { data, error } = await supabaseClient
    .from("users")
    .select("name, coins")
    .eq("uid", uid)
    .maybeSingle();   // ✅ FIX (no 406 error)

  if(error){
    console.log(error);
    return;
  }

  document.getElementById("username").innerText =
    data?.name || "Player";

  document.getElementById("coins").innerText =
    data?.coins || 0;
}


// 🔴 REALTIME COINS
function realtimeCoins(uid){

  supabaseClient
    .channel("coins-channel")
    .on(
      "postgres_changes",
      {
        event: "UPDATE",
        schema: "public",
        table: "users"
      },
      payload => {

        if(payload.new.uid === uid){
          document.getElementById("coins").innerText =
            payload.new.coins;
        }

      }
    )
    .subscribe();
}


// 🔗 NAVIGATION
function goTo(page){
  window.location.href = page;
}

init();
</script>

</body>
</html>
