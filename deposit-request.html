<div id="data"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
const supabaseClient = supabase.createClient(
  "https://ggkqsfkxmmusrmczoyuk.supabase.co/",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdna3FzZmt4bW11c3JtY3pveXVrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyNjg2NDIsImV4cCI6MjA5MDg0NDY0Mn0.p5Y2FFlNsFweZ2yc290eRs92mVKJTLnEU2C2y-qZZBI"
);

async function loadData(){

  let { data } = await supabaseClient
    .from("deposits")
    .select("*")
    .order("created_at", { ascending: false });

  let div = document.getElementById("data");
  div.innerHTML = "";

  data.forEach(d => {

    div.innerHTML +=` 
      <div class="card">
        <p>UID: ${d.uid}</p>
        <p>Amount: ₹${d.amount}</p>
        <p>UTR: ${d.utr}</p>
        <p>Status: ${d.status}</p>

        ${
          d.status === "pending"
          ?` 
          <button onclick="approve('${d.uid}', ${d.amount}, '${d.id}')">✅ Approve</button>
          <button onclick="reject('${d.id}')">❌ Reject</button>
                                   `
          : ""
        }
      </div>
    `;
  });
}

loadData();
</script>
