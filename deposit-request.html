<!DOCTYPE html>
<html>
<head>
  <title>PENDING DEPOSIT REQUESTS</title>
  <link rel="stylesheet" href="deposit.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<!-- ☰ Toggle Button -->
<div class="menu-btn" onclick="toggleSidebar()">☰</div>

<!-- Sidebar -->
<div id="sidebar" class="sidebar">
  <h3>🎮 Admin</h3>

  <button onclick="go('dashboard.html')">🏠 Dashboard</button>
  <button onclick="go('deposit-request.html')">💰 Deposits</button>
  <button onclick="go('withdraw.html')">💸 Withdraw</button>
  <button onclick="go('users.html')">👤 Users</button>
</div>

<!-- Main Content -->
<div class="main">

  <h2>💰 Deposit Requests</h2>

  <div id="data">

    <!-- Sample Card -->
    <div class="card">
      <div class="top">
        <span>👤 test123</span>
        <span class="pending">pending</span>
      </div>

      <p>💰 Amount: ₹100</p>
      <p>🧾 UTR: abc123</p>

      <div class="actions">
        <button class="approve">Approve</button>
        <button class="reject">Reject</button>
      </div>
    </div>

  </div>

</div>

<script>
function toggleSidebar(){
  document.getElementById("sidebar").classList.toggle("active");
}

function go(page){
  window.location.href = page;
}
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script>
const supabaseClient = supabase.createClient(
  "https://ggkqsfkxmmusrmczoyuk.supabase.co/",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdna3FzZmt4bW11c3JtY3pveXVrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyNjg2NDIsImV4cCI6MjA5MDg0NDY0Mn0.p5Y2FFlNsFweZ2yc290eRs92mVKJTLnEU2C2y-qZZBI"
);
    async function loadData(){

  const { data, error } = await supabaseClient
    .from("deposits")
    .select("*")
    .order("created_at", { ascending: false });

  console.log(data, error);

  let container = document.getElementById("data");
  container.innerHTML = "";

  if(error){
    container.innerHTML = "<p>Error loading data ❌</p>";
    return;
  }

  if(data.length === 0){
    container.innerHTML = "<p>No deposits yet 😴</p>";
    return;
  }

  data.forEach(d => {

    let statusClass = d.status;

    container.innerHTML += `
      <div class="card">
        <div class="top">
          <span>👤 ${d.uid}</span>
          <span class="${statusClass}">${d.status}</span>
        </div>

        <p>💰 Amount: ₹${d.amount}</p>
        <p>🧾 UTR: ${d.utr}</p>

        ${
          d.status === "pending"
          ? `
          <div class="actions">
            <button class="approve" onclick="approve('${d.uid}', ${d.amount}, '${d.id}')">Approve</button>
            <button class="reject" onclick="reject('${d.id}')">Reject</button>
          </div>
          `
          : ""
        }

        ${
          d.status === "rejected"
          ? <p class="rejected">❌ ${d.rejection_reason || ""}</p>
          : ""
        }
      </div>
    `;
  });
}
    loadData();
</script>

</body>
</html>
