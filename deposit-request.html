<!DOCTYPE html>
<html>
<head>
  <title>Admin Deposit Requests</title>
  <link rel="stylesheet" href="deposit-request.css">
</head>

<body>

<h1>💰 Deposit Requests</h1>

<div id="data"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
const supabaseClient = supabase.createClient(
  "https://ggkqsfkxmmusrmczoyuk.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdna3FzZmt4bW11c3JtY3pveXVrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyNjg2NDIsImV4cCI6MjA5MDg0NDY0Mn0.p5Y2FFlNsFweZ2yc290eRs92mVKJTLnEU2C2y-qZZBI"
);

// 🔥 LOAD DATA
async function loadData(){

  const { data, error } = await supabaseClient
    .from("deposits")
    .select("*")
    .order("created_at", { ascending: false });

  const container = document.getElementById("data");
  container.innerHTML = "";

  if(error){
    container.innerHTML = "<p>Error loading ❌</p>";
    console.log(error);
    return;
  }

  if(!data || data.length === 0){
    container.innerHTML = "<p>No deposits yet 😴</p>";
    return;
  }

  data.forEach(function(d){

    let actions = "";

    if(d.status === "pending"){
      actions =` 
        <div class="actions">
          <button class="approve" onclick="approveDeposit('${d.id}', '${d.uid}', ${d.amount})">Approve</button>
          <button class="reject" onclick="reject('${d.id}')">Reject</button>
        </div>
      `;
    }

    let reason = "";
    if(d.status === "rejected"){
      reason = `<p class="rejectText">❌ ${d.rejection_reason || ""}</p>`;
    }

    container.innerHTML +=`  
      <div class="card">
        <div class="top">
          <span>👤 ${d.uid}</span>
          <span class="${d.status}">${d.status}</span>
        </div>

        <p>💰 Amount: ₹${d.amount}</p>
        <p>🧾 UTR: ${d.utr}</p>

        ${actions}
        ${reason}
      </div>
    `;
  });
}

loadData();


// ✅ APPROVE
async function approveDeposit(id, uid, amount){

  await supabaseClient
    .from("deposits")
    .update({ status: "approved" })
    .eq("id", id);

  let { data } = await supabaseClient
    .from("users")
    .select("coins")
    .eq("uid", uid)
    .single();

  let coins = data?.coins || 0;

  await supabaseClient
    .from("users")
    .update({ coins: coins + amount })
    .eq("uid", uid);

  alert("Deposit Approved ✅");

  await supabaseClient.from("transactions").insert([{
  uid: uid,
  type: "deposit",
  amount: amount,
  status: "success",
  message: "Deposit approved"
}]);

  loadData();
}


// ❌ REJECT
async function reject(id){

  let reason = prompt("Enter reject reason:");

  await supabaseClient
    .from("deposits")
    .update({ 
      status: "rejected",
      rejection_reason: reason
    })
    .eq("id", id);

  alert("❌ Rejected");

  loadData();
}
</script>

</body>
</html>
