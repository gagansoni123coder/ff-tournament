<!-- Main Content -->

<script>
function toggleSidebar(){

function go(page){

}
 <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
const supabaseClient = supabase.createClient(
  "https://ggkqsfkxmmusrmczoyuk.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdna3FzZmt4bW11c3JtY3pveXVrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyNjg2NDIsImV4cCI6MjA5MDg0NDY0Mn0.p5Y2FFlNsFweZ2yc290eRs92mVKJTLnEU2C2y-qZZBI"
);

async function loadData(){

  const { data, error } = await supabaseClient
    .from("deposits")
    .select("*")
    .order("created_at", { ascending: false });

  console.log("DATA:", data);
  console.log("ERROR:", error);

  const container = document.getElementById("data");
  container.innerHTML = "";

  if(error){
    container.innerHTML = "<p>Error loading data ❌</p>";
    return;
  }

  if(!data.length === 0){
    container.innerHTML = "<p>No deposits yet 😴</p>";
    return;
  }

  data.forEach(function(d){

    let actions = "";
    if(d.status === "pending"){
      actions =` 
        <div class="actions">
          <button class="approve" onclick="approve('${d.uid}', ${d.amount}, '${d.id}')">Approve</button>
          <button class="reject" onclick="reject('${d.id}')">Reject</button>
        </div>
      `;
    }

    let reason = "";
    if(d.status === "rejected"){
      reason = `<p class="rejected">❌ ${d.rejection_reason 
 ""}</p>;
    }

    container.innerHTML +=` 
      <div class="card">
        <div class="top">
          <span>👤 ${d.uid}</span>
          <span class="${d.status}">${d.status}</span>
        </div>

        <p>💰 Amount: ₹${d.amount}</p>
        <p>🧾 UTR: ${d.utr}</p>

        ${actions}
        ${reason}
      </div>
    `;
  });
}

// AUTO LOAD
loadData();


// DUMMY FUNCTIONS (abhi error avoid ke liye)
function approve(){
  alert("Approve clicked");
}

function reject(){
  alert("Reject clicked");
}
</script>
