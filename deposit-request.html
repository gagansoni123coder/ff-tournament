<!DOCTYPE html>
<html>
<head>
  <title>Deposit Requests</title>
  <link rel="stylesheet" href="deposit.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<h2>💰 Deposit Requests</h2>

<div id="data"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
const supabaseClient = supabase.createClient(
  "https://ggkqsfkxmmusrmczoyuk.supabase.co/",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdna3FzZmt4bW11c3JtY3pveXVrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyNjg2NDIsImV4cCI6MjA5MDg0NDY0Mn0.p5Y2FFlNsFweZ2yc290eRs92mVKJTLnEU2C2y-qZZBI"
);

// LOAD DATA
async function loadData(){

  const { data, error } = await supabaseClient
    .from("deposits")
    .select("*")
    .order("created_at", { ascending: false });

  const container = document.getElementById("data");
  container.innerHTML+=` "";

  data.forEach(d => {

    let statusClass = d.status;

    container.innerHTML +=
      <div class="card">
        <div class="top">
          <span>👤 ${d.uid}</span>
          <span class="${statusClass}">${d.status}</span>
        </div>

        <p>💰 Amount: ₹${d.amount}</p>
        <p>🧾 UTR: ${d.utr}</p>
        <p>⏱ ${new Date(d.created_at).toLocaleString()}</p>

        ${
          d.status === "pending"
          ?` 
          <div class="actions">
            <button class="approve" onclick="approve('${d.uid}', ${d.amount}, '${d.id}')">Approve</button>
            <button class="reject" onclick="reject('${d.id}')">Reject</button>
          </div>
          
         ` : ""
        }

        ${
          d.status === "rejected"
          ?`<p class="reason">❌ ${d.rejection_reason || ""}</p>`
          : ""
        }
      </div>
    `;
  });
}

loadData();


// ✅ APPROVE
async function approve(uid,
amount, deposit_id){

  await supabaseClient
    .from("deposits")
    .update({ status: "approved" })
    .eq("id", deposit_id);

  let { data } = await supabaseClient
    .from("users")
    .select("Coins")
    .eq("Uid", uid)
    .single();

  let current = data?.Coins || 0;

  await supabaseClient
    .from("users")
    .update({ Coins: current + amount })
    .eq("Uid", uid);

  alert("Approved & Coins Added 💰");
  loadData();
}


// ❌ REJECT
async function reject(id){

  let reason = prompt("Enter reason:");
  if(!reason) return;

  await supabaseClient
    .from("deposits")
    .update({
      status: "rejected",
      rejection_reason: reason
    })
    .eq("id", id);

  alert("Rejected ❌");
  loadData();
}
</script>

</body>
</html>
