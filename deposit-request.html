<!DOCTYPE html>
<html>
<head>
  <title>PENDING DEPOSIT REQUESTS</title>
  <link rel="stylesheet" href="deposit.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<!-- ☰ Toggle Button -->
<div class="menu-btn" onclick="toggleSidebar()">☰</div>

<!-- Sidebar -->
<div id="sidebar" class="sidebar">
  <h3>🎮 Admin</h3>

  <button onclick="go('dashboard.html')">🏠 Dashboard</button>
  <button onclick="go('deposit-request.html')">💰 Deposits</button>
  <button onclick="go('withdraw.html')">💸 Withdraw</button>
  <button onclick="go('users.html')">👤 Users</button>
</div>

<!-- Main Content -->
<div class="main">

  <h2>💰 Deposit Requests</h2>

  <div id="data">

    <!-- Sample Card -->
    <div class="card">
      <div class="top">
        <span>👤 test123</span>
        <span class="pending">pending</span>
      </div>

      <p>💰 Amount: ₹100</p>
      <p>🧾 UTR: abc123</p>

      <div class="actions">
        <button class="approve">Approve</button>
        <button class="reject">Reject</button>
      </div>
    </div>

  </div>

</div>

<script>
function toggleSidebar(){
  document.getElementById("sidebar").classList.toggle("active");
}

function go(page){
  window.location.href = page;
}
</script>

</body>
</html>
