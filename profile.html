<script>
const supabaseClient = supabase.createClient(
  "https://ggkqsfkxmmusrmczoyuk.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdna3FzZmt4bW11c3JtY3pveXVrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyNjg2NDIsImV4cCI6MjA5MDg0NDY0Mn0.p5Y2FFlNsFweZ2yc290eRs92mVKJTLnEU2C2y-qZZBI"
);

async function loadProfile(){

  const { data } = await supabaseClient.auth.getSession();
  const user = data.session?.user;

  if(!user){
    window.location.href = "login.html";
    return;
  }

  // 👇 Supabase se data fetch
  const { data: profile, error } = await supabaseClient
    .from("users")
    .select("*")
    .eq("uid", user.id)
    .single();

  if(error){
    console.log(error);
    return;
  }

  // 👇 Data set
  document.getElementById("name").innerText = profile.name;
  document.getElementById("uid").innerText = profile.uid;
  document.getElementById("email").innerText = profile.email;
  document.getElementById("coins").innerText = profile.coins;

}

loadProfile();
</script>
</body>
