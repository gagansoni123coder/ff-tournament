<!DOCTYPE html>
<html>
<head>
  <title>Profile</title>
  <link rel="stylesheet" href="profile.css">
</head>

<body>

<div class="container">

  <h1>👤 Profile</h1>

  <div class="card">
    <p><strong>Name:</strong> <span id="name">Loading...</span></p>
    <p><strong>Email:</strong> <span id="email">Loading...</span></p>
    <p><strong>UID:</strong> <span id="uid">Loading...</span></p>
    <p><strong>Coins:</strong> <span id="coins">Loading...</span></p>

    <button onclick="logout()">Logout</button>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
const supabaseClient = supabase.createClient(
  "https://gkgqsfkxmmusrmczoyuk.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdna3FzZmt4bW11c3JtY3pveXVrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyNjg2NDIsImV4cCI6MjA5MDg0NDY0Mn0.p5Y2FFlNsFweZ2yc290eRs92mVKJTLnEU2C2y-qZZBI"
);


// 🔥 LOAD PROFILE
async function loadProfile(){

  const { data: { user } } = await supabaseClient.auth.getUser();

  if(!user){
    alert("Not logged in");
    window.location.href = "login.html";
    return;
  }

  // 👇 auth se basic info
  document.getElementById("email").innerText = user.email;
  document.getElementById("uid").innerText = user.id;

  // 👇 users table se extra data
  const { data, error } = await supabaseClient
    .from("users")
    .select("*")
    .eq("uid", user.id)
    .single();

  console.log(data, error);

  if(data){
    document.getElementById("name").innerText = data.name || "No Name";
    document.getElementById("coins").innerText = data.coins || 0;
  } else {
    document.getElementById("name").innerText = "Not Found";
    document.getElementById("coins").innerText = "0";
  }

}

loadProfile();


// 🚪 LOGOUT
async function logout(){
  await supabaseClient.auth.signOut();
  window.location.href = "login.html";
}
</script>

</body>
</html>
