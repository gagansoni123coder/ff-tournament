<body>

<!-- 🔥 PROFILE CARD -->
<div class="profile-card">

  <div class="top-section">
    <img src="avatar.png" class="avatar">

    <div class="info">
      <h2 id="name">Loading...</h2>
      <p>UID: <span id="uid"></span></p>
      <p>Email: <span id="email"></span></p>

      <div class="coins-box">
        💰 <span id="coins">0</span> Coins
      </div>
    </div>
  </div>

</div>

<!-- 🔥 MENU -->
<div class="menu">

  <div class="menu-btn" onclick="go('wallet.html')">
    <img src="wallet.png">
    <div>
      <h3>Wallet</h3>
      <p>Check your balance & transactions</p>
    </div>
    <span>›</span>
  </div>

  <div class="menu-btn" onclick="go('history.html')">
    <img src="history.png">
    <div>
      <h3>History</h3>
      <p>View your match history</p>
    </div>
    <span>›</span>
  </div>

  <div class="menu-btn" onclick="go('rewards.html')">
    <img src="rewards.png">
    <div>
      <h3>Rewards</h3>
      <p>Claim your rewards & bonuses</p>
    </div>
    <span>›</span>
  </div>

  <div class="menu-btn" onclick="go('support.html')">
    <img src="support.png">
    <div>
      <h3>Support</h3>
      <p>Get help & support</p>
    </div>
    <span>›</span>
  </div>

  <div class="menu-btn" onclick="go('terms.html')">
    <img src="terms.png">
    <div>
      <h3>Terms</h3>
      <p>Read our terms & conditions</p>
    </div>
    <span>›</span>
  </div>

  <div class="menu-btn" onclick="logout()">
    <img src="logout.png">
    <div>
      <h3>Logout</h3>
      <p>Logout from your account</p>
    </div>
    <span>›</span>
  </div>

</div>

<button class="back" onclick="history.back()">← Back</button>

<!-- 🔥 SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
const supabaseClient = supabase.createClient(
  "https://ggkqsfkxmmusrmczoyuk.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdna3FzZmt4bW11c3JtY3pveXVrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyNjg2NDIsImV4cCI6MjA5MDg0NDY0Mn0.p5Y2FFlNsFweZ2yc290eRs92mVKJTLnEU2C2y-qZZBI"
);

// LOAD PROFILE
async function loadProfile(){
  const { data:{user} } = await supabaseClient.auth.getUser();

  if(!user){
    window.location.href = "login.html";
    return;
  }

  document.getElementById("uid").innerText = user.id;
  document.getElementById("email").innerText = user.email;

  const { data } = await supabaseClient
    .from("users")
    .select("*")
    .eq("uid", user.id)
    .single();

  if(data){
    document.getElementById("name").innerText = data.name;
    document.getElementById("coins").innerText = data.coins;
  }
}

function go(page){
  window.location.href = page;
}

async function logout(){
  await supabaseClient.auth.signOut();
  window.location.href="login.html";
}

loadProfile();
</script>

</body>
</html>
