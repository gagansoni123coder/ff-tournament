<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<link rel="stylesheet" href="profile.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>

<body>

<!-- 🔥 PROFILE CARD -->
<div class="profile-card">

  <h2 id="name">Loading...</h2>
  <p id="uid"></p>
  <p id="email"></p>

  <div class="coins-box">
    💰 <span id="coins">0</span> Coins
  </div>

</div>

<!-- 🔥 MENU BUTTONS -->
<div class="menu">

  <a href="wallet.html" class="menu-item">
    <img src="images/wallet.jpg">
    <div class="overlay">Wallet</div>
  </a>

  <a href="history.html" class="menu-item">
    <img src="images/history.jpg">
    <div class="overlay">History</div>
  </a>

  <a href="rewards.html" class="menu-item">
    <img src="images/rewards.jpg">
    <div class="overlay">Rewards</div>
  </a>

  <a href="support.html" class="menu-item">
    <img src="images/support.jpg">
    <div class="overlay">Support</div>
  </a>

  <a href="terms.html" class="menu-item">
    <img src="images/terms.jpg">
    <div class="overlay">Terms</div>
  </a>

  <a href="#" onclick="logout()" class="menu-item">
    <img src="images/logout.jpg">
    <div class="overlay">Logout</div>
  </a>

</div>

<!-- 🔙 BACK BUTTON -->
<div class="back-btn" onclick="goBack()">← Back</div>

<!-- 🔥 SCRIPT -->
<script>
const supabaseClient = supabase.createClient(
  "https://ggkqsfkxmmusrmczoyuk.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdna3FzZmt4bW11c3JtY3pveXVrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyNjg2NDIsImV4cCI6MjA5MDg0NDY0Mn0.p5Y2FFlNsFweZ2yc290eRs92mVKJTLnEU2C2y-qZZBI"
);

// INIT
async function init(){
  const { data } = await supabaseClient.auth.getSession();
  const user = data.session?.user;

  if(!user){
    window.location.href = "login.html";
    return;
  }

  loadUser(user.id);
}

// LOAD USER
async function loadUser(uid){

  const { data, error } = await supabaseClient
    .from("users")
    .select("*")
    .eq("uid", uid)
    .single();

  if(error){
    console.log(error);
    return;
  }

  document.getElementById("name").innerText = data.name || "Player";
  document.getElementById("uid").innerText = "UID: " + data.uid;
  document.getElementById("email").innerText = "Email: " + (data.email || "...");
  document.getElementById("coins").innerText = data.coins || 0;
}

// LOGOUT
async function logout(){
  await supabaseClient.auth.signOut();
  window.location.href = "login.html";
}

// BACK
function goBack(){
  window.location.href = "home.html";
}

init();
</script>

</body>
</html>
