<!DOCTYPE html>
<html>
<head>
  <title>Profile</title>
  <link rel="stylesheet" href="style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<div class="profile-container">

  <!-- Top -->
  <div class="top-bar">
    <h2>👋 Welcome</h2>
    <div class="coins-box">💰 0</div>
  </div>

  <!-- Avatar -->
  <div class="profile-header">
    <img src="https://i.pravatar.cc/150" class="avatar">
    <h2 id="name">Loading...</h2>
    <p id="uid">UID: ---</p>
  </div>

  <!-- Stats -->
  <div class="stats">
    <div>
      <h3>0</h3>
      <p>Matches</p>
    </div>
    <div>
      <h3>0</h3>
      <p>Kills</p>
    </div>
    <div>
      <h3>0</h3>
      <p>Coins</p>
    </div>
  </div>

  <!-- Menu -->
  <div class="menu">
    <div class="menu-item">👤 My Profile</div>
    <div class="menu-item"onclick="openwallet()">💼 Wallet</div>
    <div class="menu-item">🎮 My Matches</div>
    <div class="menu-item">🏆 Leaderboard</div>
    <div class="menu-item">🎁 Rewards</div>
    <div class="menu-item">📢 Announcement</div>
    <div class="menu-item">⚙ Settings</div>
    <div class="menu-item logout" onclick="logout()">🚪 Logout</div>
  </div>

</div>

);

  function openwallet() {
    window.href="wallet.html";

// user data load
async function loadProfile() {
  const { data: { user } } = await supabaseClient.auth.getUser();

  if (!user) {
    window.location.href = "login.html";
    return;
  }

  // name email
  document.getElementById("name").innerText = user.user_metadata.name  "User";
  document.getElementById("uid").innerText = "UID: " + (user.user_metadata.uid 
 "N/A");
}

loadProfile();

// logout
async function logout() {
  await supabaseClient.auth.signOut();
  window.location.href = "login.html";
}
