<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile</title>
<link rel="stylesheet" href="profile.css">
</head>

<body>

<div class="container">

  <!-- 🔥 PROFILE CARD -->
  <div class="profile-card">
    <div class="avatar"></div>

    <h2 id="name">Player</h2>
    <p id="uid">UID: ---</p>
    <p id="email">Email: ---</p>

    <div class="coins-box">
      💰 <span id="coins">0</span> Coins
    </div>
  </div>

  <!-- 🎮 MENU BUTTONS -->
  <div class="menu-grid">

    <div class="menu-btn" onclick="go('wallet.html')">
      <img src="wallet.png">
      <span>Wallet</span>
    </div>

    <div class="menu-btn" onclick="go('history.html')">
      <img src="history.png">
      <span>History</span>
    </div>

    <div class="menu-btn" onclick="go('rewards.html')">
      <img src="reward.png">
      <span>Rewards</span>
    </div>

    <div class="menu-btn" onclick="go('support.html')">
      <img src="support.png">
      <span>Support</span>
    </div>

    <div class="menu-btn" onclick="go('terms.html')">
      <img src="terms.png">
      <span>Terms</span>
    </div>

    <div class="menu-btn logout" onclick="logout()">
      <img src="logout.png">
      <span>Logout</span>
    </div>

  </div>

  <!-- 🔙 BACK BUTTON -->
  <button class="back-btn" onclick="go('home.html')">← Back</button>

</div>

<!-- SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
const supabaseClient = supabase.createClient(
  "https://ggkqsfkxmmusrmczoyuk.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdna3FzZmt4bW11c3JtY3pveXVrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyNjg2NDIsImV4cCI6MjA5MDg0NDY0Mn0.p5Y2FFlNsFweZ2yc290eRs92mVKJTLnEU2C2y-qZZBI"
);

// LOAD PROFILE
async function loadProfile(){

  const { data } = await supabaseClient.auth.getSession();
  const user = data.session?.user;

  if(!user){
    window.location.href = "login.html";
    return;
  }

  document.getElementById("email").innerText = "Email: " + user.email;
  document.getElementById("uid").innerText = "UID: " + user.id;

  const { data: userData } = await supabaseClient
    .from("users")
    .select("*")
    .eq("uid", user.id)
    .single();

  if(userData){
    document.getElementById("name").innerText = userData.name;
    document.getElementById("coins").innerText = userData.coins;
  }
}

function go(page){
  window.location.href = page;
}

async function logout(){
  await supabaseClient.auth.signOut();
  window.location.href = "login.html";
}

loadProfile();
</script>

</body>
</html>
