<!DOCTYPE html>
<html>
<head>
  <title>Register</title>
  <link rel="stylesheet" href="style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="manifest.json">
</head>

<body>

<header>🎮 Register</header>

<form id="registerForm">
  <input type="text" id="name" placeholder="Name" required>
  <input type="email" id="email" placeholder="Email" required>
  <input type="password" id="password" placeholder="Password" required>
  <input type="password" id="confirmPassword" placeholder="Confirm Password" required><br><br>
  <input type="text" id="uid" placeholder="Free Fire UID" required><br><br>

<label><input type="checkbox" id="terms" required> I agree to Terms & Conditions </label>
  <button onclick="window.location.href='/home.html'">Register Now</button>

  <p id="msg"></p>
</form>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
const supabaseClient = supabase.createClient(
  "https://ggkqsfkxmmusrmczoyuk.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdna3FzZmt4bW11c3JtY3pveXVrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyNjg2NDIsImV4cCI6MjA5MDg0NDY0Mn0.p5Y2FFlNsFweZ2yc290eRs92mVKJTLnEU2C2y-qZZBI"
   {
  auth:{
    persistsession: true,
    autorefreshtoken:true
   }
  }
);

const form = document.getElementById("registerForm");

form.addEventListener("submit", async (e) => {
  e.preventDefault();
  let password = document.getElementById("password").value;
let confirmPassword = document.getElementById("confirmPassword").value;

if (password !== confirmPassword) {
  alert("Password not match ❌");
  return;
}

let terms = document.getElementById("terms").checked;

if (!terms) {
  alert("Accept Terms & Conditions ⚠️");
  return;
}
  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
const { data, error } = await supabaseClient.auth.signUp({
  email,
  password,
  options: {
    data: {
      name: name
    }
  }
});

if (error) {
  document.getElementById("msg").innerText = error.message;
  return;
}

// 🔥 USER mil raha hai yaha
const user = data.user;

if (!user) {
  alert("Check email verification ⚠️");
  return;
}

// ✅ INSERT BEFORE REDIRECT
const { error: insertError } = await supabaseClient.from("users").insert([
  {
    id: user.id,
    name: name,
    email: email,
    uid: uid
  }
]);

if (insertError) {
  alert("Data save failed ❌");
  return;
}

// ✅ AB REDIRECT
alert("Registration successful 🔥");
window.location.href = "login.html";
  
]);
</script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js');
}
</script>
</body>
</html>
