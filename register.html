<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SoniX Esports | Register</title>
  <link rel="stylesheet" href="Register.css" />
</head>
<body>  <div class="container">
    <div class="logo">SoniX <span>Esports</span></div>
    <h2>Player Registration 🎮</h2><form id="registerForm">

  <div class="input-group">
    <label>Name</label>
    <input type="text" id="name" placeholder="Enter your name" required>
  </div>

  <div class="input-group">
    <label>Email</label>
    <input type="email" id="email" placeholder="Enter email" required>
  </div>

  <div class="input-group">
    <label>Mobile Number</label>
    <input type="tel" id="phone" placeholder="Enter mobile number" required>
  </div>

  <div class="input-group">
    <label>Password</label>
    <input type="password" id="password" placeholder="Enter password" required>
  </div>

  <div class="input-group">
    <label>Refer Code (optional)</label>
    <input type="text" id="refer" placeholder="Enter refer code">
  </div>

  <div class="checkbox-group">
    <input type="checkbox" id="terms" required>
    <label for="terms">I agree to all Terms & Conditions</label>
  </div>

  <button type="submit">Register 🔥</button>

  <div class="login-link">
    If you already have an account <a href="login.html">Login Now</a>
  </div>

</form>

  </div>  <!-- Supabase -->  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script> 
  
  <script>
    const supabaseUrl = "https://ggkqsfkxmmusrmczoyuk.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdna3FzZmt4bW11c3JtY3pveXVrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyNjg2NDIsImV4cCI6MjA5MDg0NDY0Mn0.p5Y2FFlNsFweZ2yc290eRs92mVKJTLnEU2C2y-qZZBI";
const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

const form = document.getElementById("registerForm");

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;
  const phone = document.getElementById("phone").value;
  const password = document.getElementById("password").value;
  const refer = document.getElementById("refer").value;

  // check existing account
  const { data: existing } = await supabase
    .from("users")
    .select("id")
    .or(`email.eq.${email},phone.eq.${phone}`);

  if (existing.length > 1) {
    alert("Account already exists 😤");
    return;
  }

  // insert data
  const { error } = await supabase
    .from("registrations")
    .insert([{ name, email, phone, password, refer }]);

  if (error) {
    alert(error.message);
  } else {
    alert("Registered Successfully 🔥");
    window.location.href = "home.html";
  }
});
  </script></body>
</html>/*
