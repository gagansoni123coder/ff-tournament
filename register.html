<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SoniX Esports | Register</title>
  <link rel="stylesheet" href="Register.css">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="container">
  <h2>Register 🎮</h2>

  <form id="registerForm">
    <input type="text" id="name" placeholder="Name" required><br><br>
    <input type="email" id="email" placeholder="Email" required><br><br>
    <input type="tel" id="phone" placeholder="Phone" required><br><br>
    <input type="password" id="password" placeholder="Password" required><br><br>
    <input type="text" id="refer" placeholder="Refer Code"><br><br>

    <button type="submit">Register</button>
  </form>
</div>

<script>
const supabase = window.supabase.createClient(
  "https://ggkqsfkxmmusrmczoyuk.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdna3FzZmt4bW11c3JtY3pveXVrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyNjg2NDIsImV4cCI6MjA5MDg0NDY0Mn0.p5Y2FFlNsFweZ2yc290eRs92mVKJTLnEU2C2y-qZZBI"
);

const form = document.getElementById("registerForm");

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  const name = document.getElementById("name").value.trim();
  const email = document.getElementById("email").value.trim();
  const phone = document.getElementById("phone").value.trim();
  const password = document.getElementById("password").value;
  const refer = document.getElementById("refer").value.trim();

  // ✅ Step 1: Auth signup
  const { data: authData, error: authError } = await supabase.auth.signUp({
    email: email,
    password: password
  });

  if (authError) {
    alert(authError.message);
    return;
  }

  // ✅ Step 2: Insert into table
  const { error: insertError } = await supabase
    .from("users")
    .insert([
      {
        name: name,
        email: email,
        phone: phone,
        refer: refer,
        user_id: authData.user.id
      }
    ]);

  if (insertError) {
    alert("DB Error: " + insertError.message);
    return;
  }

  alert("Registered Successfully 🔥");
  window.location.href = "home.html";
});
</script>

</body>
</html>
