<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<h2>👑 Admin Panel</h2>

<div id="list"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
const supabaseClient = supabase.createClient(
  "https://ggkqsfkxmmusrmczoyuk.supabase.co/",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdna3FzZmt4bW11c3JtY3pveXVrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyNjg2NDIsImV4cCI6MjA5MDg0NDY0Mn0.p5Y2FFlNsFweZ2yc290eRs92mVKJTLnEU2C2y-qZZBI"
);

// 🔥 LOAD DATA
async function loadDeposits() {

  const { data, error } = await supabaseClient
    .from("deposits")
    .select("*")
    .order("created_at", { ascending: false });

  if (error) {
    alert("Error: " + error.message);
    console.log(error);
    return;
  }

  if (!data || data.length === 0) {
    document.getElementById("list").innerHTML = "<p>No deposits found ❌</p>";
    return;
  }

  let html = "";

  data.forEach(d => {
    html += 
      <div style="border:1px solid white; margin:10px; padding:10px;">
        <p><b>User ID:</b> ${d.user_id}</p>
        <p><b>Amount:</b> ₹${d.amount}</p>
        <p><b>UTR:</b> ${d.utr}</p>
        <p><b>Status:</b> ${d.status}</p>

        ${d.status === "pending" ? 
          <button onclick="approve('${d.id}','${d.user_id}',${d.amount})">✅ Approve</button>
          <button onclick="reject('${d.id}')">❌ Reject</button>
         : ""}
      </div>
    ;
  });

  document.getElementById("list").innerHTML = html;
}

loadDeposits();


// ✅ APPROVE
async function approve(id, user_id, amount) {
// update status
  await supabaseClient
    .from("deposits")
    .update({ status: "approved" })
    .eq("id", id);

  // get coins
  let { data } = await supabaseClient
    .from("users")
    .select("coins")
    .eq("id", user_id)
    .single();

  let newCoins = (data?.coins || 0) + amount;

  // update coins
  await supabaseClient
    .from("users")
    .update({ coins: newCoins })
    .eq("id", user_id);

  alert("Approved ✅ Coins Added");
  loadDeposits();
}


// ❌ REJECT
async function reject(id) {
  await supabaseClient
    .from("deposits")
    .update({ status: "rejected" })
    .eq("id", id);

  alert("Rejected ❌");
  loadDeposits();
}

</script>

</body>
</html>
