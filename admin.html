// 🔐 Check admin
async function checkAdmin() {
  const { data: userData } = await supabase.auth.getUser();

  if (!userData.user) {
    window.location.href = "login.html";
    return;
  }

  const { data } = await supabase
    .from("users")
    .select("")
    .eq("id", userData.user.id)
    .single();

  if (!data.is_admin) {
    alert("Access Denied ❌");
    window.location.href = "home.html";
  }
}

checkAdmin();

// 👥 Load users
async function loadUsers() {
  const { data, error } = await supabase.from("users").select("");

  let html = "";

  data.forEach(user => {
    html += 
      <div style="border:1px solid white; margin:10px; padding:10px;">
        <p>Name: ${user.name}</p>
        <p>Email: ${user.email}</p>
        <p>Coins: ${user.coins}</p>
        
        <button onclick="addCoins('${user.id}')">+50 Coins</button>
        <button onclick="removeCoins('${user.id}')">-20 Coins</button>
        <button onclick="banUser('${user.id}')">Ban 🚫</button>
        <button onclick="unbanUser('${user.id}')">Unban ✅</button>
      </div>
    ;
  });

  document.getElementById("users").innerHTML = html;
}

loadUsers();

// 💰 Add coins
async function addCoins(id) {
  const { data } = await supabase.from("users").select("coins").eq("id", id).single();

  await supabase.from("users")
    .update({ coins: data.coins + 50 })
    .eq("id", id);

  loadUsers();
}

// ❌ Remove coins
async function removeCoins(id) {
  const { data } = await supabase.from("users").select("coins").eq("id", id).single();

  await supabase.from("users")
    .update({ coins: data.coins - 20 })
    .eq("id", id);

  loadUsers();
}

// 🚫 Ban
async function banUser(id) {
  await supabase.from("users")
    .update({ banned: true })
    .eq("id", id);

  loadUsers();
}

// ✅ Unban
async function unbanUser(id) {
  await supabase.from("users")
    .update({ banned: false })
    .eq("id", id);

  loadUsers();
}
  <h2>Deposit Requests</h2>
<div id="list"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
const supabaseClient = supabase.createClient(
  "https://your_url.supabase.co/",
  "YOUR_ANON_KEY"
);

async function loadDeposits() {

  let { data } = await supabaseClient
    .from("deposits")
    .select("*")
    .order("created_at", { ascending: false });

  let html = "";

  data.forEach(d => {
    html += 
      <div style="border:1px solid white; margin:10px; padding:10px;">
        <p>Amount: ₹${d.amount}</p>
        <p>UTR: ${d.utr}</p>
        <p>Status: ${d.status}</p>
        <button onclick="approve('${d.id}', '${d.user_id}', ${d.amount})">Approve</button>
      </div>
    ;
  });

  document.getElementById("list").innerHTML = html;
}

async function approve(id, user_id, amount) {

  // update status
  await supabaseClient.from("deposits")
    .update({ status: "approved" })
    .eq("id", id);

  // get current coins
  let { data } = await supabaseClient
    .from("users")
    .select("coins")
    .eq("id", user_id)
    .single();

  let newCoins = (data.coins || 0) + amount;

  // update coins
  await supabaseClient.from("users")
    .update({ coins: newCoins })
    .eq("id", user_id);

  alert("Approved & Coins Added ✅");
  loadDeposits();
}

loadDeposits();
</script>
