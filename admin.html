<html>

</head>
<body>

<h2>👑 Admin Panel</h2>

<div id="list"></div>

<!-- SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
const supabaseClient = supabase.createClient(
  "https://ggkqsfkxmmusrmczoyuk.supabase.co/",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdna3FzZmt4bW11c3JtY3pveXVrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyNjg2NDIsImV4cCI6MjA5MDg0NDY0Mn0.p5Y2FFlNsFweZ2yc290eRs92mVKJTLnEU2C2y-qZZBI"
);

// LOAD DEPOSITS
async function loadDeposits() {

  const { data, error } = await supabaseClient
    .from("deposits")
    .select("*")
    console.log("DATA:", data);
    console.log("ERROR:", error);
  
  if (error) {
    console.log(error);
    document.getElementById("list").innerHTML = "<p>Error loading data ❌</p>";
    return;
  }

  if (!data || data.length === 0) {
    document.getElementById("list").innerHTML = "<p>No deposits found ❌</p>";
    return;
  }

  let html = "";

  data.forEach(d => {
    html += ` 
<div class="admin-card">
  <p><b>User:</b> ${d.user_id}</p>
  <p><b>Amount:</b> ₹${d.amount}</p>
  <p><b>UTR:</b> ${d.utr}</p>
  <p><b>Status:</b> ${d.status}</p>

  <button onclick="approve('${d.id}', ${d.amount}, '${d.user_id}')">✅ Approve</button>
  <button onclick="reject('${d.id}')">❌ Reject</button>
</div>
';
  });

  document.getElementById("list").innerHTML = html;
}

loadDeposits();


// ✅ APPROVE
async function approve(id, user_id, amount) {

  // update deposit status
  await supabaseClient
    .from("deposits")
    .update({ status: "approved" })
.eq("id", id);

  // add coins to user
  let { data: userData } = await supabaseClient
    .from("users")
    .select("coins")
    .eq("id", user_id)
    .single();

  let newCoins = (userData?.coins || 0) + Number(amount);

  await supabaseClient
    .from("users")
    .update({ coins: newCoins })
    .eq("id", user_id);

  alert("Approved & Coins Added ✅");

  loadDeposits();
}


// ❌ REJECT
async function reject(id) {
  await supabaseClient
    .from("deposits")
    .update({ status: "rejected" })
    .eq("id", id);

  alert("Rejected ❌");

  loadDeposits();
}

</script>

</body>
</html>
