<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
  <link rel="stylesheet" href="admin.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>🎮 Admin</h2>

  <button onclick="showPage('dashboard')">Dashboard</button>
  <button onclick="showPage('deposits')">Deposits</button>
  <button onclick="showPage('withdraw')">Withdraw</button>
  <button onclick="showPage('users')">Users</button>
</div>

<!-- MAIN -->
<div class="main">

  <!-- DASHBOARD -->
  <div id="dashboard">
    <h2>📊 Dashboard</h2>

    <div class="top">
      <div class="stat">💰 Total Deposits<br>₹0</div>
      <div class="stat">👤 Users<br>0</div>
      <div class="stat">💸 Withdraw<br>₹0</div>
    </div>
  </div>

  <!-- DEPOSITS -->
  <div id="deposits" style="display:none;">
    <h2>💰 Deposit Requests</h2>
    <div id="depositList"></div>
  </div>

  <!-- WITHDRAW -->
  <div id="withdraw" style="display:none;">
    <h2>💸 Withdraw Requests</h2>
    <div class="card">No withdraw yet</div>
  </div>

  <!-- USERS -->
  <div id="users" style="display:none;">
    <h2>👤 Users</h2>
    <div class="card">User list coming soon</div>
  </div>

</div>

<script>
function showPage(page) {
  document.getElementById("dashboard").style.display = "none";
  document.getElementById("deposits").style.display = "none";
  document.getElementById("withdraw").style.display = "none";
  document.getElementById("users").style.display = "none";

  document.getElementById(page).style.display = "block";
}
// DEMO DATA (baad me supabase se connect karenge)
let demo = [
  {user_id:"123", amount:100, status:"pending"},
  {user_id:"456", amount:200, status:"pending"}
];

function loadDeposits() {
  let html = "";

  demo.forEach(d => {
    html += 
      <div class="card">
        <p>User: ${d.user_id}</p>
        <p>Amount: ₹${d.amount}</p>
        <p>Status: ${d.status}</p>

        <button class="approve">Approve</button>
        <button class="reject">Reject</button>
      </div>
    ;
  });

  document.getElementById("depositList").innerHTML = html;
}

loadDeposits();
</script>

</body>
</html>
